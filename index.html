<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Egor Sevastyanov</title>

  <style>

    body {
      margin: 0;
      background: #161616;
      color: #d8d8d8;
      font-family: "Helvetica Neue", sans-serif;

      padding: 40px;
      box-sizing: border-box;
    }

    .container {
      max-width: 700px;
      margin: 0 auto;
    }

    h1 {
      font-size: 25px;
      font-weight: normal;
      margin-bottom: 20px;
    }

    p {
      font-size: 19px;
      line-height: 1.6;
      color: #9a9a9a;
    }

    .hero-image {
      width: 100%;
      max-width: 700px;
      margin-bottom: 40px;
      display: block;
    }

    .work-list {
      margin-top: 80px;
    }

    .work-list-title {
      font-size: 14px;
      letter-spacing: 1px;
      color: #666;
      margin-bottom: 40px;
    }

    .year-heading {
      font-size: 15px;
      color: #666;
      margin-top: 50px;
      margin-bottom: 20px;
    }

    .work-item {
      margin-bottom: 18px;
      font-size: 20px;
    }

    a {
      color: #d8d8d8;
      text-decoration: none;
      border-bottom: 1px solid #444;
    }

    a:hover {
      color: white;
      border-color: white;
    }

  </style>
</head>

<body>

  <div class="container">

    <img src="images/MagnoliaFilmLab336234.jpg" class="hero-image">

    <h1>Hi, I’m Egor.</h1>

    <p>
      A living archive of films, music, streams,
      field recordings and audiovisual works.
    </p>

    <div class="work-list">

      <div class="work-list-title">

      </div>

      <div class="year-heading">
        2026
      </div>

      <div class="work-item">

      </div>

    </div>

  </div>

</html>
